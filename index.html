<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apresentação de cota</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐋</text></svg>">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <img src="logo.png" alt="logo da iGreen" class="logo" width="15">
      <span class="sb-logo-name">iGreen</span>
    </div>
    <div class="sb-title">Visão</div>
    <div class="nav-item active" data-view="geral">Geral</div>
    <div class="nav-div"></div>
    <div class="sb-title" id="sb-colab-title" style="display:none">Colaboradores</div>
    <div id="nav-members"></div>
    <div id="upload-zone">
      <label class="upload-btn" for="file-input">&#8593; Carregar planilha</label>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls">
      <div class="upload-hint">CSV ou Excel</div>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <span id="page-title">Geral</span>
      <div id="period-controls">
        <button class="arrow-btn" id="btn-prev" title="Trimestre anterior">&#8592;</button>
        <span id="trimestre-badge">Trimestre 1</span>
        <span id="trimestre-range">Fevereiro – Abril</span>
        <button class="arrow-btn" id="btn-next" title="Próximo trimestre">&#8594;</button>
      </div>
    </div>
    <div id="content">
      <div id="no-data-msg">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <p>Nenhuma planilha carregada</p>
        <span>Use o botão na barra lateral para importar o arquivo</span>
      </div>
    </div>
  </div>
</div>
<script src="dashboard.js"></script>
</body>
</html>
